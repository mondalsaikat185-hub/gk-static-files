<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Service Book Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:sans-serif;background:#f0f2f5}
header{background:#1a237e;color:#fff;padding:12px 20px;display:flex;justify-content:space-between;align-items:center}
.bar{background:#fff;padding:10px 18px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid #ddd}
.bar input,.bar select{padding:6px 10px;border:1px solid #ccc;border-radius:4px}.btn{padding:7px 12px;border:none;border-radius:4px;cursor:pointer;font-weight:bold;color:#fff}
.g{background:#2e7d32}.b{background:#1565c0}.r{background:#c62828}
table{width:100%;border-collapse:collapse;background:#fff;font-size:0.85rem;white-space:nowrap}
th{background:#1a237e;color:#fff;padding:10px;text-align:left;position:sticky;top:0}
td{padding:8px 10px;border-bottom:1px solid #eee;vertical-align:top}
.bold-rack{font-weight:900;color:#c62828;font-size:0.95rem;background:#ffebee;padding:3px 6px;border-radius:4px;text-align:center}
.modal, .login-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;align-items:center;justify-content:center}
.show{display:flex !important}
.mb{background:#fff;padding:20px;border-radius:8px;width:700px;max-width:95%;max-height:90vh;overflow-y:auto}
.grid-form{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fg{margin-bottom:10px}.fg label{display:block;margin-bottom:3px;font-size:.8rem;font-weight:bold}
.fg input,.fg select, .fg textarea{width:100%;padding:8px;border:1px solid #ccc;border-radius:4px}
.login-box{background:#fff;padding:30px;border-radius:8px;width:350px;text-align:center;box-shadow:0 4px 15px rgba(0,0,0,0.2)}
.login-box h2{margin-bottom:20px;color:#1a237e}
.login-box input{width:100%;padding:10px;margin-bottom:15px;border:1px solid #ccc;border-radius:4px}
.login-box button{width:100%;padding:10px;background:#1a237e;color:#fff;border:none;border-radius:4px;font-size:1rem;cursor:pointer}
#app-content{display:none}
.name-col{font-weight:bold;color:#1a237e;white-space:normal;min-width:150px;word-wrap:break-word}
.remarks-col{color:#d32f2f;font-weight:bold;white-space:normal;min-width:150px;word-wrap:break-word;background-color:#fff3e0;padding:5px;border-radius:4px;}
</style>
</head>
<body>

<div class="login-overlay show" id="loginScreen">
    <div class="login-box">
        <h2>🔒 Login Required</h2>
        <input type="text" id="userid" placeholder="User ID">
        <input type="password" id="pwd" placeholder="Password">
        <button onclick="login()">Login</button>
        <p id="loginErr" style="color:red;font-size:0.8rem;margin-top:10px;display:none">Invalid ID or Password!</p>
    </div>
</div>

<div id="app-content">
<header><h3>📚 Service Book Tracker</h3><span id="ls">Connecting...</span></header>
<div class="bar">
<input type="text" id="q" placeholder="Search Name, Stack, Category..." oninput="ft()" style="width:250px">
<button class="btn g" onclick="oa()">+ Add New Record</button>
<button class="btn r" onclick="logout()" style="margin-left:auto">Logout</button>
</div>
<div style="overflow-x:auto">
<table id="mt">
<thead>
<tr>
<th>Name</th>
<th>Designation</th>
<th>Stack No.</th>
<th>Remarks (Status)</th>
<th>Post (Posting Place)</th>
<th>Date of Posting</th>
<th>DOB</th>
<th>Retirement</th>
<th>DOJ (Comm.)</th>
<th>DOJ (Dept.)</th>
<th>Category</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>
</div>
</div>

<!-- Modal -->
<div class="modal" id="md">
<div class="mb">
<h3 id="mtit" style="margin-bottom:15px;color:#1a237e;text-align:center">Add / Edit Record</h3>
<div class="grid-form">
    <div class="fg"><label>Name*</label><input id="fn"></div>
    <div class="fg"><label>Designation</label><input id="fdesig"></div>
    <div class="fg"><label>Stack Number*</label><input id="fsc"></div>
    <div class="fg"><label>Post (Place of Posting)</label><input id="fpost"></div>
    <div class="fg"><label>Date of Posting (DOJ in Station)</label><input id="fdojs"></div>
    <div class="fg"><label>Date of Birth</label><input id="fdob"></div>
    <div class="fg"><label>Date of Retirement</label><input id="fret"></div>
    <div class="fg"><label>DOJ in Commission</label><input id="fdojc"></div>
    <div class="fg"><label>DOJ in Department</label><input id="fdojd"></div>
    <div class="fg"><label>Category</label><input id="fcat"></div>
    <div class="fg" style="grid-column: span 2;"><label>Remarks (Pending/Sent to PAO/Staff)</label><textarea id="frem" rows="2" placeholder="Example: File transferred to Saikat on 12-04-2025"></textarea></div>
</div>
<div style="display:flex;gap:10px;margin-top:15px">
<button class="btn g" style="flex:1;padding:10px" onclick="sv()">Save Record</button>
<button class="btn r" style="flex:1;padding:10px" onclick="cl()">Cancel</button>
</div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

const fb = initializeApp({apiKey: "AIzaSyDTISW3t14smuZJip2nYhOYM6XrYSrN_pI", authDomain: "service-book-tracker.firebaseapp.com", projectId: "service-book-tracker", storageBucket: "service-book-tracker.firebasestorage.app", messagingSenderId: "1080714862635", appId: "1:1080714862635:web:9c5c096b2536d5a976ca6e"});
const db = getFirestore(fb), col = collection(db, "employees"); 
let ALL = [], EID = null;

const USERS = { "admin": "admin123", "saikat": "saikat123", "office": "office123" };
window.login = () => {
    const u = document.getElementById("userid").value.trim().toLowerCase(), p = document.getElementById("pwd").value.trim();
    if(USERS[u] && USERS[u] === p) {
        document.getElementById("loginScreen").classList.remove("show"); document.getElementById("app-content").style.display = "block"; sessionStorage.setItem("loggedIn", "true"); loadData(); 
    } else document.getElementById("loginErr").style.display = "block";
};
window.logout = () => { sessionStorage.removeItem("loggedIn"); location.reload(); };
if(sessionStorage.getItem("loggedIn") === "true") { document.getElementById("loginScreen").classList.remove("show"); document.getElementById("app-content").style.display = "block"; loadData(); }

function loadData() {
    onSnapshot(col, s => { ALL = s.docs.map(d => ({id: d.id, ...d.data()})); ALL.sort((a,b)=>(a.name||"").localeCompare(b.name||"")); document.getElementById("ls").textContent="🟢 Live"; ft(); });
}

window.ft = () => { 
    const v = document.getElementById("q").value.toLowerCase();
    const f = ALL.filter(e => (!v || [e.name, e.section, e.designation, e.category, e.remarks].some(x=>(x||"").toLowerCase().includes(v))));
    
    document.getElementById("tb").innerHTML = f.map(e => `<tr>
        <td class="name-col">${e.name||""}</td>
        <td>${e.designation||""}</td>
        <td class="bold-rack">${e.section||""}</td>
        <td><div class="remarks-col">${e.remarks||"Available"}</div></td>
        <td>${e.placeOfPosting||""}</td>
        <td>${e.dateJoiningCurrentStation||""}</td>
        <td>${e.dob||""}</td>
        <td>${e.dateOfRetirement||e.retirement||""}</td>
        <td>${e.dateJoiningCommissionerate||""}</td>
        <td>${e.dateJoiningDepartment||""}</td>
        <td>${e.category||""}</td>
        <td style="display:flex;gap:5px;flex-direction:column;">
            <button class="btn b" onclick="ed('${e.id}')">Edit</button>
            <button class="btn r" onclick="dl('${e.id}')">Delete</button>
        </td>
    </tr>`).join("");
};

window.oa = () => { 
    EID=null; document.getElementById("mtit").innerText = "Add New Record";
    ["fn","fdesig","fsc","fpost","fdob","fret","fdojs","fdojc","fdojd","fcat","frem"].forEach(i=>document.getElementById(i).value=""); 
    document.getElementById("md").classList.add("show"); 
};
window.cl = () => document.getElementById("md").classList.remove("show");

window.ed = (id) => { 
    EID=id; const e=ALL.find(x=>x.id===id); document.getElementById("mtit").innerText = "Edit Record";
    document.getElementById("fn").value=e.name||""; document.getElementById("fdesig").value=e.designation||""; 
    document.getElementById("fsc").value=e.section||""; document.getElementById("fpost").value=e.placeOfPosting||""; 
    document.getElementById("fdob").value=e.dob||""; document.getElementById("fret").value=e.dateOfRetirement||e.retirement||""; 
    document.getElementById("fdojs").value=e.dateJoiningCurrentStation||""; document.getElementById("fdojc").value=e.dateJoiningCommissionerate||""; 
    document.getElementById("fdojd").value=e.dateJoiningDepartment||""; document.getElementById("fcat").value=e.category||""; 
    document.getElementById("frem").value=e.remarks||""; 
    document.getElementById("md").classList.add("show"); 
};

window.dl = async (id) => { if(confirm("Are you sure you want to permanently DELETE this record?")) await deleteDoc(doc(db, "employees", id)); };

window.sv = async () => { 
    const obj = {
        name: document.getElementById("fn").value, designation: document.getElementById("fdesig").value, 
        section: document.getElementById("fsc").value, placeOfPosting: document.getElementById("fpost").value, 
        dob: document.getElementById("fdob").value, dateOfRetirement: document.getElementById("fret").value, 
        dateJoiningCurrentStation: document.getElementById("fdojs").value, dateJoiningCommissionerate: document.getElementById("fdojc").value, 
        dateJoiningDepartment: document.getElementById("fdojd").value, category: document.getElementById("fcat").value, 
        remarks: document.getElementById("frem").value, updatedAt: serverTimestamp()
    };
    if(EID) await updateDoc(doc(db,"employees",EID),obj); else await addDoc(col,obj); 
    cl(); 
};
</script></body></html>
