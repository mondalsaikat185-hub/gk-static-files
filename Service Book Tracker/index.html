<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Service Book Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:sans-serif;background:#f0f2f5}
header{background:#1a237e;color:#fff;padding:12px 20px;display:flex;justify-content:space-between;align-items:center}
.bar{background:#fff;padding:10px 18px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid #ddd}
.bar input,.bar select{padding:6px 10px;border:1px solid #ccc;border-radius:4px}.btn{padding:7px 12px;border:none;border-radius:4px;cursor:pointer;font-weight:bold;color:#fff}
.g{background:#2e7d32}.b{background:#1565c0}.r{background:#c62828}.o{background:#e65100}
table{width:100%;border-collapse:collapse;background:#fff}th{background:#1a237e;color:#fff;padding:10px;text-align:left;position:sticky;top:0}
td{padding:8px 10px;border-bottom:1px solid #eee;font-size:.85rem}.av{background:#e8f5e9;color:#2e7d32;padding:2px 5px;font-weight:bold}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;align-items:center;justify-content:center}.modal.show{display:flex}
.mb{background:#fff;padding:20px;border-radius:8px;width:450px;max-width:95%}.fg{margin-bottom:10px}.fg label{display:block;margin-bottom:3px;font-size:.8rem}
.fg input,.fg select,.fg textarea{width:100%;padding:6px}
</style>
</head>
<body>
<header><h3>📚 Service Book Tracker</h3><span id="ls">Connecting...</span></header>
<div class="bar">
<input type="text" id="q" placeholder="Search..." oninput="ft()">
<select id="sf" onchange="ft()"><option value="">All Status</option><option>Available</option><option>With Staff</option><option>Sent to PAO</option><option>Missing</option></select>
<button class="btn g" onclick="oa()">+ Add Employee</button>
</div>
<div style="overflow-x:auto"><table id="mt"><thead><tr><th>Name</th><th>CPF</th><th>Section</th><th>Status</th><th>Location</th><th>Remarks</th><th>Actions</th></tr></thead><tbody id="tb"></tbody></table></div>
<div class="modal" id="md"><div class="mb"><h3 id="mtit">Add</h3>
<div class="fg">abel>Name*</label><input id="fn"></div><div class="fg">abel>CPF</label><input id="fc"></div><div class="fg">abel>Section</label><input id="fsc"></div>
<div class="fg">abel>Status</label><select id="fst"><option>Available</option><option>With Staff</option><option>Sent to PAO</option><option>Missing</option></select></div>
<div class="fg">abel>Location</label><input id="fl"></div><div class="fg">abel>Remarks</label><textarea id="fr"></textarea></div><div class="fg">abel>By</label><input id="fu"></div>
<button class="btn r" onclick="cl()">Cancel</button><button class="btn g" onclick="sv()">Save</button></div></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
const fb = initializeApp({apiKey: "AIzaSyDTISW3t14smuZJip2nYhOYM6XrYSrN_pI", authDomain: "service-book-tracker.firebaseapp.com", projectId: "service-book-tracker", storageBucket: "service-book-tracker.firebasestorage.app", messagingSenderId: "1080714862635", appId: "1:1080714862635:web:9c5c096b2536d5a976ca6e"});
const db = getFirestore(fb), col = collection(db, "employees"); let ALL = [], EID = null;
onSnapshot(col, s => { ALL = s.docs.map(d => ({id: d.id, ...d.data()})); ALL.sort((a,b)=>(a.name||"").localeCompare(b.name||"")); document.getElementById("ls").textContent="🟢 Live"; ft(); });
window.ft = () => { const v = document.getElementById("q").value.toLowerCase(), s = document.getElementById("sf").value;
const f = ALL.filter(e => (!v || [e.name,e.cpf,e.section,e.status].some(x=>(x||"").toLowerCase().includes(v))) && (!s || e.status === s));
document.getElementById("tb").innerHTML = f.map(e => `<tr><td>${e.name}</td><td>${e.cpf}</td><td>${e.section}</td><td><span class="av">${e.status}</span></td><td>${e.location||""}</td><td>${e.remarks||""}</td><td><button class="btn o" onclick="ed('${e.id}')">Edit</button></td></tr>`).join("");};
window.oa = () => { EID=null; document.getElementById("md").classList.add("show"); ["fn","fc","fsc","fl","fr","fu"].forEach(i=>document.getElementById(id).value=""); };
window.cl = () => document.getElementById("md").classList.remove("show");
window.ed = (id) => { EID=id; const e=ALL.find(x=>x.id===id); document.getElementById("fn").value=e.name; document.getElementById("fc").value=e.cpf; document.getElementById("fsc").value=e.section; document.getElementById("fst").value=e.status; document.getElementById("fl").value=e.location; document.getElementById("fr").value=e.remarks; document.getElementById("fu").value=e.updatedBy; document.getElementById("md").classList.add("show"); };
window.sv = async () => { const obj = {name: document.getElementById("fn").value, cpf: document.getElementById("fc").value, section: document.getElementById("fsc").value, status: document.getElementById("fst").value, location: document.getElementById("fl").value, remarks: document.getElementById("fr").value, updatedBy: document.getElementById("fu").value, updatedAt: serverTimestamp()};
if(EID) await updateDoc(doc(db,"employees",EID),obj); else await addDoc(col,obj); cl(); };
</script></body></html>
