<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Master</title>
  <meta name="theme-color" content="#1e1b4b">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0e1a;
      --surface:  #1a1929;
      --surface2: #232236;
      --border:   #2e2d4a;
      --accent:   #7c3aed;
      --accent2:  #6d28d9;
      --text:     #e2e0f0;
      --text2:    #9490b5;
      --green:    #22c55e;
      --red:      #ef4444;
      --radius:   12px;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-shrink: 0;
    }
    .logo { font-size: 18px; font-weight: 700; color: #a78bfa; }
    .logo span { color: var(--text2); font-weight: 400; font-size: 12px; margin-left: 6px; }
    .btn-signin {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-signin:hover { background: var(--accent2); }

    /* ── Mobile category tabs (hidden on desktop) ── */
    .mobile-cats {
      display: none;
      overflow-x: auto;
      white-space: nowrap;
      padding: 10px 12px;
      gap: 8px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .mobile-cats::-webkit-scrollbar { display: none; }
    .mob-cat-btn {
      display: inline-block;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text2);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all .15s;
      margin-right: 6px;
    }
    .mob-cat-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      font-weight: 600;
    }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Sidebar (desktop only) ── */
    .sidebar {
      width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
    }
    .sidebar-header {
      padding: 14px 16px 10px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: .08em;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .cat-list { padding: 8px 0; flex: 1; overflow-y: auto; }
    .cat-item {
      padding: 9px 16px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      transition: background .15s;
    }
    .cat-item:hover { background: var(--surface2); }
    .cat-item.active { background: var(--surface2); color: #a78bfa; font-weight: 600; }
    .cat-count {
      background: var(--border);
      color: var(--text2);
      font-size: 11px;
      padding: 1px 7px;
      border-radius: 20px;
      min-width: 22px;
      text-align: center;
      flex-shrink: 0;
    }
    .cat-item.active .cat-count { background: var(--accent); color: white; }
    .sidebar-footer { padding: 12px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .btn-add-cat {
      width: 100%;
      background: transparent;
      border: 1px dashed var(--border);
      color: var(--text2);
      border-radius: 8px;
      padding: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-add-cat:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Main ── */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 0;
    }
    .main-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .main-title { font-size: 17px; font-weight: 700; }
    .main-actions { display: flex; gap: 8px; align-items: center; }
    .search-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      color: var(--text);
      width: 180px;
      outline: none;
      transition: border-color .15s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text2); }
    .btn-add-prompt {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-add-prompt:hover { background: var(--accent2); }

    /* ── Prompt Cards ── */
    .prompt-grid { display: flex; flex-direction: column; gap: 10px; }
    .prompt-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .prompt-card:hover { border-color: var(--accent); background: var(--surface2); }
    .prompt-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
    }
    .prompt-name { font-size: 15px; font-weight: 600; line-height: 1.3; }
    .prompt-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
    .icon-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text2);
      border-radius: 6px;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 14px;
      transition: all .15s;
    }
    .icon-btn:hover { background: var(--accent); border-color: var(--accent); color: white; }
    .icon-btn.danger:hover { background: var(--red); border-color: var(--red); }
    .prompt-subcat {
      font-size: 11px;
      color: #a78bfa;
      background: rgba(124,58,237,.15);
      padding: 2px 8px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 6px;
    }
    .prompt-preview {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text2);
    }
    .empty .icon { font-size: 40px; margin-bottom: 12px; }

    /* ── Delete Confirm Dialog ── */
    .dialog-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .dialog-overlay.open { display: flex; }
    .dialog {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: 100%;
      max-width: 360px;
      animation: pop .2s ease;
    }
    @keyframes pop { from { transform: scale(.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .dialog-icon { font-size: 32px; text-align: center; margin-bottom: 12px; }
    .dialog-title { font-size: 17px; font-weight: 700; text-align: center; margin-bottom: 8px; }
    .dialog-msg { font-size: 14px; color: var(--text2); text-align: center; margin-bottom: 20px; line-height: 1.5; }
    .dialog-name {
      font-weight: 600;
      color: var(--text);
    }
    .dialog-actions { display: flex; gap: 10px; }
    .dialog-actions button {
      flex: 1;
      padding: 11px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity .15s;
    }
    .dialog-actions button:hover { opacity: .85; }
    .btn-cancel { background: var(--surface2); color: var(--text); }
    .btn-confirm-delete { background: var(--red); color: white; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      background: var(--green); color: white;
      padding: 10px 22px; border-radius: 20px;
      font-size: 14px; font-weight: 600;
      opacity: 0; transition: opacity .3s;
      pointer-events: none; z-index: 999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
    .toast.error { background: var(--red); }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      .sidebar { display: none; }
      .mobile-cats { display: flex; }
      .search-input { width: 120px; }
      .main { padding: 12px; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">⚡ Prompt Master <span>v2</span></div>
  <button class="btn-signin" id="signInBtn">Sign in with Google</button>
</header>

<!-- Mobile category tabs -->
<div class="mobile-cats" id="mobileCats"></div>

<!-- Layout -->
<div class="layout">

  <!-- Sidebar (desktop) -->
  <aside class="sidebar">
    <div class="sidebar-header">Categories</div>
    <div class="cat-list" id="catList"></div>
    <div class="sidebar-footer">
      <button class="btn-add-cat" id="addCatBtn">+ Add Category</button>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main">
    <div class="main-header">
      <div class="main-title" id="mainTitle">All Prompts</div>
      <div class="main-actions">
        <input class="search-input" id="searchInput" type="text" placeholder="Search…" />
        <button class="btn-add-prompt" id="addPromptBtn">+ Add Prompt</button>
      </div>
    </div>
    <div class="prompt-grid" id="promptGrid"></div>
  </main>

</div>

<!-- Delete Confirm Dialog -->
<div class="dialog-overlay" id="deleteDialog">
  <div class="dialog">
    <div class="dialog-icon">🗑️</div>
    <div class="dialog-title">Delete Prompt?</div>
    <div class="dialog-msg">
      Are you sure you want to delete<br>
      "<span class="dialog-name" id="deletePromptName"></span>"?<br>
      <small style="color:var(--red)">This cannot be undone.</small>
    </div>
    <div class="dialog-actions">
      <button class="btn-cancel" onclick="closeDeleteDialog()">Cancel</button>
      <button class="btn-confirm-delete" id="confirmDeleteBtn">Yes, Delete</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

  });
  mobileCats.innerHTML = mobHTML;
}
