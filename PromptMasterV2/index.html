<!DOCTYPE html><!-- build:1777972950 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Prompt Master</title>
<meta name="theme-color" content="#1e1b4b">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PromptMaster">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0e1a;--surface:#1a1929;--surface2:#232236;--border:#2e2d4a;--accent:#7c3aed;--accent2:#6d28d9;--text:#e2e0f0;--text2:#9490b5;--green:#22c55e;--red:#ef4444;--radius:12px}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-shrink:0}
.logo{font-size:18px;font-weight:700;color:#a78bfa}
.logo span{color:var(--text2);font-weight:400;font-size:12px;margin-left:6px}
.header-right{display:flex;align-items:center;gap:10px}
.btn-signin{background:var(--accent);color:white;border:none;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s}
.btn-signin:hover{background:var(--accent2)}
.btn-signin:disabled{background:var(--border);cursor:not-allowed}
.user-info{display:flex;align-items:center;gap:8px}
.user-avatar{width:32px;height:32px;border-radius:50%;border:2px solid var(--accent);object-fit:cover}
.user-name{font-size:13px;font-weight:600;color:var(--text);max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn-signout{background:transparent;color:var(--text2);border:1px solid var(--border);border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;transition:all .15s}
.btn-signout:hover{border-color:var(--red);color:var(--red)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0}
.sync-dot.ok{background:var(--green)}
.sync-dot.syncing{background:var(--yellow,#eab308);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.mobile-cats{display:none;overflow-x:auto;white-space:nowrap;padding:10px 12px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.mobile-cats::-webkit-scrollbar{display:none}
.mob-btn{display:inline-block;background:var(--surface2);border:1px solid var(--border);color:var(--text2);border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;margin-right:6px;transition:all .15s}
.mob-btn.active{background:var(--accent);border-color:var(--accent);color:white;font-weight:600}
.layout{display:flex;flex:1;overflow:hidden;min-height:0}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-hdr{padding:14px 16px 10px;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border);flex-shrink:0}
.cat-list{padding:8px 0;flex:1;overflow-y:auto}
.cat-item{padding:9px 16px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:6px;transition:background .15s}
.cat-item:hover{background:var(--surface2)}
.cat-item.active{background:var(--surface2);color:#a78bfa;font-weight:600}
.cat-count{background:var(--border);color:var(--text2);font-size:11px;padding:1px 7px;border-radius:20px;min-width:22px;text-align:center;flex-shrink:0}
.cat-item.active .cat-count{background:var(--accent);color:white}
.cat-menu-btn{opacity:0;background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:15px;padding:2px 6px;border-radius:4px;transition:opacity .15s,background .15s;flex-shrink:0;line-height:1}
.cat-item:hover .cat-menu-btn{opacity:1}
.cat-menu-btn:hover{background:var(--border)!important;color:var(--text)!important}
.mob-cat-wrap{display:inline-flex;align-items:center;margin-right:6px;vertical-align:middle}
.mob-cat-wrap .mob-btn{margin-right:0}
.mob-cat-dots{background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:13px;padding:4px 5px;line-height:1;border-radius:4px;flex-shrink:0}
.mob-cat-dots:hover{background:var(--border);color:var(--text)}
.cat-ctx-menu{display:none;position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 24px rgba(0,0,0,.55);z-index:5000;min-width:130px;overflow:hidden}
.cat-ctx-menu.open{display:block}
.cat-ctx-item{padding:11px 16px;font-size:13px;cursor:pointer;color:var(--text);transition:background .15s;white-space:nowrap;display:flex;align-items:center;gap:8px}
.cat-ctx-item:hover{background:var(--surface2)}
.cat-ctx-item.danger{color:var(--red)}
.sidebar-footer{padding:12px;border-top:1px solid var(--border);flex-shrink:0}
.btn-add-cat{width:100%;background:transparent;border:1px dashed var(--border);color:var(--text2);border-radius:8px;padding:8px;font-size:13px;cursor:pointer;transition:all .15s}
.btn-add-cat:hover{border-color:var(--accent);color:var(--accent)}
.main{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;min-width:0}
.main-hdr{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.main-title{font-size:17px;font-weight:700}
.main-actions{display:flex;gap:8px;align-items:center}
.search-input{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--text);width:180px;outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--text2)}
.btn-add-prompt{background:var(--accent);color:white;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.btn-add-prompt:hover{background:var(--accent2)}
.prompt-grid{display:flex;flex-direction:column;gap:10px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:border-color .15s,background .15s}
.card:hover{border-color:var(--accent);background:var(--surface2)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px}
.card-name{font-size:15px;font-weight:600;line-height:1.3}
.card-btns{display:flex;gap:4px;flex-shrink:0}
.ibtn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);border-radius:6px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all .15s}
.ibtn:hover{background:var(--accent);border-color:var(--accent);color:white}
.ibtn.danger:hover{background:var(--red);border-color:var(--red)}
.subcat{font-size:11px;color:#a78bfa;background:rgba(124,58,237,.15);padding:2px 8px;border-radius:20px;display:inline-block;margin-bottom:6px}
.preview{font-size:13px;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tap-hint{font-size:11px;color:var(--border);margin-top:8px;text-align:right}
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty .icon{font-size:40px;margin-bottom:12px}
.empty p{margin-bottom:12px}
/* Modals */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;align-items:flex-end;justify-content:center;padding:0}
.overlay.open{display:flex}
.view-modal{background:var(--surface);border-radius:16px 16px 0 0;width:100%;max-width:680px;max-height:90vh;display:flex;flex-direction:column;animation:slideup .25s ease}
@keyframes slideup{from{transform:translateY(60px);opacity:0}to{transform:none;opacity:1}}
.view-modal-hdr{padding:18px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0;position:relative}
.view-modal-name{font-size:18px;font-weight:700;margin-bottom:4px;padding-right:40px}
.view-modal-sub{font-size:12px;color:#a78bfa;background:rgba(124,58,237,.15);padding:2px 10px;border-radius:20px;display:inline-block}
.view-modal-body{padding:16px 20px;overflow-y:auto;flex:1}
.view-modal-text{font-size:14px;line-height:1.8;color:var(--text);white-space:pre-wrap;word-break:break-word}
.view-modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0}
.view-modal-footer button{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:opacity .15s}
.view-modal-footer button:hover{opacity:.85}
.btn-view-copy{background:var(--accent);color:white}
.btn-view-edit{background:var(--surface2);color:var(--text);border:1px solid var(--border)!important}
.btn-view-close{background:transparent;color:var(--text2);font-size:20px;position:absolute;top:14px;right:16px;border:none;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px}
.btn-view-close:hover{background:var(--surface2)}
/* Form modals */
.form-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;align-items:center;justify-content:center;padding:20px}
.form-overlay.open{display:flex}
.form-modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:100%;max-width:500px;animation:pop .2s ease;max-height:90vh;overflow-y:auto}
@keyframes pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.form-title{font-size:17px;font-weight:700;margin-bottom:20px}
.form-group{margin-bottom:16px}
.form-label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:block}
.form-input,.form-select,.form-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;color:var(--text);outline:none;transition:border-color .15s;font-family:inherit}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent)}
.form-textarea{min-height:140px;resize:vertical;line-height:1.6}
.form-select option{background:var(--surface2)}
.form-actions{display:flex;gap:10px;margin-top:20px}
.form-actions button{flex:1;padding:11px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:opacity .15s}
.form-actions button:hover{opacity:.85}
.btn-save{background:var(--accent);color:white}
.btn-form-cancel{background:var(--surface2);color:var(--text)}
/* Delete dialog */
.del-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;align-items:center;justify-content:center;padding:20px}
.del-overlay.open{display:flex}
.dialog{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:100%;max-width:360px;animation:pop .2s ease}
.dialog-icon{font-size:32px;text-align:center;margin-bottom:12px}
.dialog-title{font-size:17px;font-weight:700;text-align:center;margin-bottom:8px}
.dialog-msg{font-size:14px;color:var(--text2);text-align:center;margin-bottom:20px;line-height:1.5}
.dname{font-weight:600;color:var(--text)}
.dialog-btns{display:flex;gap:10px}
.dialog-btns button{flex:1;padding:11px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none}
.btn-cancel{background:var(--surface2);color:var(--text)}
.btn-del{background:var(--red);color:white}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green);color:white;padding:10px 22px;border-radius:20px;font-size:14px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
.toast.err{background:var(--red)}
@media(max-width:640px){
  .sidebar{display:none}
  .mobile-cats{display:block}
  .search-input{width:100px}
  .main{padding:12px}
  .user-name{display:none}
}
</style>
</head>
<body>
<header>
  <div class="logo">&#9889; Prompt Master <span>v2</span></div>
  <div class="header-right">
    <div class="sync-dot" id="syncDot"></div>
    <div id="authArea"><button class="btn-signin" id="signInBtn">Sign in with Google</button></div>
  </div>
</header>
<div id="dbPanel" style="display:none;position:fixed;top:60px;right:8px;width:280px;background:#1a1a2e;border:1px solid #7c3aed;border-radius:8px;padding:8px 10px;z-index:9999;max-height:200px;overflow-y:auto;font-family:monospace;font-size:10px;color:#a0a0c0;box-shadow:0 4px 20px rgba(0,0,0,.5)">
<div style="display:flex;justify-content:space-between;margin-bottom:4px"><b style="color:#a78bfa;font-size:11px">🔍 SYNC LOG</b><button onclick="document.getElementById('dbPanel').style.display='none'" style="background:#333;color:#fff;border:none;border-radius:4px;padding:1px 6px;cursor:pointer;font-size:10px">✕</button></div>
<div id="dbLog"></div>
</div>
<div class="mobile-cats" id="mobileCats"></div>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-hdr">Categories</div>
    <div class="cat-list" id="catList"></div>
    <div class="sidebar-footer">
      <button class="btn-add-cat" id="addCatBtn">+ Add Category</button>
    </div>
  </aside>
  <main class="main">
    <div class="main-hdr">
      <div class="main-title" id="mainTitle">All Prompts</div>
      <div class="main-actions">
        <input class="search-input" id="searchInput" type="text" placeholder="Search...">
        <button class="btn-add-prompt" id="addPromptBtn">+ Add Prompt</button>
      </div>
    </div>
    <div class="prompt-grid" id="promptGrid"></div>
  </main>
</div>

<!-- View Modal -->
<div class="overlay" id="viewOverlay" style="position:fixed">
  <div class="view-modal">
    <div class="view-modal-hdr">
      <button class="btn-view-close" id="viewClose">&#10005;</button>
      <div class="view-modal-name" id="viewName"></div>
      <div id="viewSub"></div>
    </div>
    <div class="view-modal-body"><div class="view-modal-text" id="viewText"></div></div>
    <div class="view-modal-footer">
      <button class="btn-view-copy" id="viewCopyBtn">&#128203; Copy Prompt</button>
      <button class="btn-view-edit" id="viewEditBtn">&#9999; Edit</button>
    </div>
  </div>
</div>

<!-- Add/Edit Prompt Modal -->
<div class="form-overlay" id="promptFormOverlay">
  <div class="form-modal">
    <div class="form-title" id="promptFormTitle">Add Prompt</div>
    <div class="form-group">
      <label class="form-label">Prompt Name *</label>
      <input class="form-input" id="fName" type="text" placeholder="e.g. Blog Post Writer">
    </div>
    <div class="form-group">
      <label class="form-label">Category *</label>
      <select class="form-select" id="fCat"></select>
    </div>
    <div class="form-group">
      <label class="form-label">Subcategory (optional)</label>
      <input class="form-input" id="fSub" type="text" placeholder="e.g. Content Writing">
    </div>
    <div class="form-group">
      <label class="form-label">Prompt Text *</label>
      <textarea class="form-textarea" id="fText" placeholder="Write your prompt here..."></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-form-cancel" id="promptFormCancel">Cancel</button>
      <button class="btn-save" id="promptFormSave">Save</button>
    </div>
  </div>
</div>

<!-- Add Category Modal -->
<div class="form-overlay" id="catFormOverlay">
  <div class="form-modal">
    <div class="form-title">Add Category</div>
    <div class="form-group">
      <label class="form-label">Category Name *</label>
      <input class="form-input" id="fCatName" type="text" placeholder="e.g. Marketing">
    </div>
    <div class="form-actions">
      <button class="btn-form-cancel" id="catFormCancel">Cancel</button>
      <button class="btn-save" id="catFormSave">Save</button>
    </div>
  </div>
</div>

<!-- Delete Dialog -->
<div class="del-overlay" id="delOverlay">
  <div class="dialog">
    <div class="dialog-icon">&#128465;</div>
    <div class="dialog-title">Delete Prompt?</div>
    <div class="dialog-msg">Are you sure you want to delete<br>"<span class="dname" id="delName"></span>"?<br><small style="color:var(--red)">This cannot be undone.</small></div>
    <div class="dialog-btns">
      <button class="btn-cancel" id="delCancel">Cancel</button>
      <button class="btn-del" id="delConfirm">Yes, Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Category Context Menu -->
<div class="cat-ctx-menu" id="catCtxMenu">
  <div class="cat-ctx-item" id="catCtxEdit">&#9999;&#xFE0E; Rename</div>
  <div class="cat-ctx-item danger" id="catCtxDel">&#128465; Delete</div>
</div>

<!-- Edit Category Modal -->
<div class="form-overlay" id="editCatFormOverlay">
  <div class="form-modal">
    <div class="form-title">Rename Category</div>
    <div class="form-group">
      <label class="form-label">Category Name *</label>
      <input class="form-input" id="fEditCatName" type="text" placeholder="e.g. Marketing">
    </div>
    <div class="form-actions">
      <button class="btn-form-cancel" id="editCatFormCancel">Cancel</button>
      <button class="btn-save" id="editCatFormSave">Save</button>
    </div>
  </div>
</div>

<!-- Delete Category Dialog -->
<div class="del-overlay" id="delCatOverlay">
  <div class="dialog">
    <div class="dialog-icon">&#128193;</div>
    <div class="dialog-title">Delete Category?</div>
    <div class="dialog-msg">Delete "<span class="dname" id="delCatName"></span>"?<br><small style="color:var(--text2)">Prompts in this category will remain in All Prompts.</small></div>
    <div class="dialog-btns">
      <button class="btn-cancel" id="delCatCancel">Cancel</button>
      <button class="btn-del" id="delCatConfirm">Yes, Delete</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { initializeFirestore, persistentLocalCache, getFirestore, collection, doc, addDoc, setDoc, deleteDoc, onSnapshot, serverTimestamp, query, orderBy }
  from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

var FIREBASE_CONFIG = {
  apiKey: "AIzaSyCXn_D3YsbrUzPxEn51n4FwhACbX9uBp9o",
  authDomain: "prompt-master-86106.firebaseapp.com",
  projectId: "prompt-master-86106",
  storageBucket: "prompt-master-86106.firebasestorage.app",
  messagingSenderId: "873076720224",
  appId: "1:873076720224:web:fbdef40c48f04df2bcb905"
};

var app  = initializeApp(FIREBASE_CONFIG);
var auth = getAuth(app);
var db;
try {
  db = initializeFirestore(app, {
    localCache: persistentLocalCache(),
    experimentalForceLongPolling: true,
    useFetchStreams: false
  });
} catch(e) {
  db = getFirestore(app);
}
var provider = new GoogleAuthProvider();

// ── State ─────────────────────────────────────────────────────────────────────
var CATS    = [];
var PROMPTS = [];
var activeCat = "all", searchQ = "", viewingId = null, editingId = null, pendingDelId = null, pendingDelCatId = null, editingCatId = null;
var currentUser = null;
var unsubCats = null, unsubPrompts = null;
var isFirstLoad = true;

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function toast(msg,type){
  var t=document.getElementById("toast");
  t.textContent=msg; t.className="toast show"+(type==="err"?" err":"");
  setTimeout(function(){t.className="toast";},3000);
}
function setSyncDot(state){
  var d=document.getElementById("syncDot");
  d.className="sync-dot"+(state==="ok"?" ok":state==="syncing"?" syncing":"");
}

// ── Auth ──────────────────────────────────────────────────────────────────────
function updateAuthUI(user){
  var area=document.getElementById("authArea");
  if(user){
    var photo=user.photoURL
      ? "<img class='user-avatar' src='"+user.photoURL+"' alt=''>"
      : "<div class='user-avatar' style='background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;color:white;font-size:14px'>"+user.displayName.charAt(0).toUpperCase()+"</div>";
    area.innerHTML="<div class='user-info'>"+photo+"<span class='user-name'>"+esc(user.displayName)+"</span><button class='btn-signout' id='signOutBtn'>Sign Out</button></div>";
    document.getElementById("signOutBtn").onclick=function(){
      signOut(auth).then(function(){toast("Signed out");}).catch(function(e){toast(e.message,"err");});
    };
  } else {
    area.innerHTML="<button class='btn-signin' id='signInBtn'>Sign in with Google</button>";
    document.getElementById("signInBtn").onclick=doSignIn;
  }
}

function doSignIn(){
  var btn=document.getElementById("signInBtn");
  if(btn){btn.disabled=true;btn.textContent="Signing in...";}
  signInWithPopup(auth,provider)
    .then(function(r){toast("Welcome, "+r.user.displayName+"!");})
    .catch(function(e){toast(e.message,"err");updateAuthUI(null);});
}

// ── Firestore Listeners ───────────────────────────────────────────────────────
function dbLog(msg){
  var el=document.getElementById("dbLog");
  if(!el)return;
  var t=new Date().toLocaleTimeString();
  el.innerHTML='<div style="margin-bottom:4px"><b>'+t+'</b> '+msg+'</div>'+el.innerHTML;
}

function startSync(uid){
  setSyncDot("syncing");
  dbLog("startSync called. UID="+uid.slice(0,8)+"...");
  if(unsubCats){unsubCats();unsubCats=null;}
  if(unsubPrompts){unsubPrompts();unsubPrompts=null;}

  var catsRef    = collection(db,"users/"+uid+"/categories");
  var promptsRef = collection(db,"users/"+uid+"/prompts");
  dbLog("Listening: users/"+uid.slice(0,8)+".../prompts");

  unsubCats = onSnapshot(catsRef, function(snap){
    CATS = snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    dbLog("CATS snapshot: "+snap.docs.length+" items. fromCache="+snap.metadata.fromCache);
    renderAll();
  }, function(e){ dbLog("CATS ERROR: "+e.code+" "+e.message); toast("Sync error: "+e.message,"err"); setSyncDot(""); });

  unsubPrompts = onSnapshot(promptsRef, function(snap){
    PROMPTS = snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    isFirstLoad = false;
    dbLog("PROMPTS snapshot: "+snap.docs.length+" items. fromCache="+snap.metadata.fromCache+" hasPendingWrites="+snap.metadata.hasPendingWrites);
    setSyncDot("ok");
    renderAll();
  }, function(e){ dbLog("PROMPTS ERROR: "+e.code+" "+e.message); toast("Sync error: "+e.message,"err"); setSyncDot(""); isFirstLoad=false; renderAll(); });
}

function stopSync(){
  if(unsubCats){unsubCats();unsubCats=null;}
  if(unsubPrompts){unsubPrompts();unsubPrompts=null;}
  CATS=[]; PROMPTS=[]; renderAll(); setSyncDot("");
}

onAuthStateChanged(auth,function(user){
  currentUser=user;
  isFirstLoad=true;
  updateAuthUI(user);
  if(user){ renderAll(); startSync(user.uid); }
  else { stopSync(); }
});

// Force Firestore to reconnect when browser comes back online
window.addEventListener('online', function(){
  dbLog("Network online - reconnecting Firestore...");
  if(currentUser){ startSync(currentUser.uid); }
});

// Also reconnect when page becomes visible again (mobile background recovery)
document.addEventListener('visibilitychange', function(){
  if(document.visibilityState==='visible' && currentUser){
    dbLog("Tab visible - checking sync...");
    startSync(currentUser.uid);
  }
});

// ── Render ────────────────────────────────────────────────────────────────────
function renderCats(){
  var list=document.getElementById("catList"), mob=document.getElementById("mobileCats");
  var allN=PROMPTS.length, s="", m="";
  var items=[{id:"all",name:"All Prompts",n:allN}];
  for(var i=0;i<CATS.length;i++){
    var n=PROMPTS.filter(function(p){return p.catId===CATS[i].id;}).length;
    items.push({id:CATS[i].id,name:CATS[i].name,n:n});
  }
  for(var i=0;i<items.length;i++){
    var it=items[i],act=activeCat===it.id;
    if(it.id==="all"){
      s+="<div class='cat-item"+(act?" active":"")+"' data-catid='"+it.id+"' onclick='window.selCat(this.dataset.catid)'><span>"+esc(it.name)+"</span><span class='cat-count'>"+it.n+"</span></div>";
      m+="<div class='mob-cat-wrap'><span class='mob-btn"+(act?" active":"")+"' data-catid='"+it.id+"' onclick='window.selCat(this.dataset.catid)'>"+esc(it.name)+" ("+it.n+")</span></div>";
    }else{
      s+="<div class='cat-item"+(act?" active":"")+"' data-catid='"+it.id+"' onclick='window.selCat(this.dataset.catid)'><span>"+esc(it.name)+"</span><div style='display:flex;align-items:center;gap:4px'><span class='cat-count'>"+it.n+"</span><button class='cat-menu-btn' data-catid='"+it.id+"' onclick='event.stopPropagation();window.openCatMenu(this.dataset.catid,event)'>&#8942;</button></div></div>";
      m+="<div class='mob-cat-wrap'><span class='mob-btn"+(act?" active":"")+"' data-catid='"+it.id+"' onclick='window.selCat(this.dataset.catid)'>"+esc(it.name)+" ("+it.n+")</span><button class='mob-cat-dots' data-catid='"+it.id+"' onclick='event.stopPropagation();window.openCatMenu(this.dataset.catid,event)'>&#8942;</button></div>";
    }
  }
  list.innerHTML=s; mob.innerHTML=m;
}

function renderPrompts(){
  var grid=document.getElementById("promptGrid"),title=document.getElementById("mainTitle");
  var list=PROMPTS.slice();
  if(activeCat!=="all") list=list.filter(function(p){return p.catId===activeCat;});
  if(searchQ){var q=searchQ.toLowerCase();list=list.filter(function(p){return p.name.toLowerCase().indexOf(q)>=0||p.text.toLowerCase().indexOf(q)>=0;});}
  if(activeCat==="all"){title.textContent="All Prompts";}
  else{for(var i=0;i<CATS.length;i++){if(CATS[i].id===activeCat){title.textContent=CATS[i].name;break;}}}
  if(!currentUser){
    grid.innerHTML="<div class='empty'><div class='icon'>&#128274;</div><p>Sign in to view and manage your prompts.</p></div>";
    return;
  }
  if(isFirstLoad){
    grid.innerHTML="<div class='empty'><div class='icon' style='animation:blink 1s infinite'>&#9728;</div><p>Loading prompts...</p><p style='font-size:13px;color:var(--text2)'>Connecting to cloud...</p></div>";
    return;
  }
  if(list.length===0){
    grid.innerHTML="<div class='empty'><div class='icon'>&#128235;</div><p>No prompts yet.</p><p style='font-size:13px;color:var(--text2)'>Click <b>+ Add Prompt</b> to create one.</p></div>";
    return;
  }
  var html="";
  for(var i=0;i<list.length;i++){
    var p=list[i];
    html+="<div class='card' data-pid='"+p.id+"' onclick='window.openView(this.dataset.pid)'>"
      +"<div class='card-top'><div class='card-name'>"+esc(p.name)+"</div>"
      +"<div class='card-btns' onclick='event.stopPropagation()'>"
        +"<div class='ibtn' data-pid='"+p.id+"' onclick='window.quickCopy(this.dataset.pid)' title='Quick Copy'>&#128203;</div>"
        +"<div class='ibtn' data-pid='"+p.id+"' onclick='window.openEdit(this.dataset.pid)' title='Edit'>&#9999;</div>"
        +"<div class='ibtn danger' data-pid='"+p.id+"' onclick='window.askDel(this.dataset.pid)' title='Delete'>&#128465;</div>"
      +"</div></div>"
      +(p.sub?"<div class='subcat'>"+esc(p.sub)+"</div>":"")
      +"<div class='preview'>"+esc(p.text)+"</div>"
      +"<div class='tap-hint'>Tap to open full prompt</div>"
    +"</div>";
  }
  grid.innerHTML=html;
}

function renderAll(){renderCats();renderPrompts();}

// ── Category select dropdown ──────────────────────────────────────────────────
function populateCatSelect(){
  var sel=document.getElementById("fCat");
  sel.innerHTML="";
  for(var i=0;i<CATS.length;i++){
    var o=document.createElement("option");
    o.value=CATS[i].id; o.textContent=CATS[i].name;
    sel.appendChild(o);
  }
}

// ── Inline onclick handlers ───────────────────────────────────────────────────
window.selCat=function(id){activeCat=id;renderAll();};

window.openView=function(id){
  var p=null;for(var i=0;i<PROMPTS.length;i++){if(PROMPTS[i].id===id){p=PROMPTS[i];break;}}
  if(!p)return;
  viewingId=id;
  document.getElementById("viewName").textContent=p.name;
  document.getElementById("viewSub").innerHTML=p.sub?"<div class='view-modal-sub'>"+esc(p.sub)+"</div>":"";
  document.getElementById("viewText").textContent=p.text;
  document.getElementById("viewOverlay").classList.add("open");
};

window.quickCopy=function(id){
  var p=null;for(var i=0;i<PROMPTS.length;i++){if(PROMPTS[i].id===id){p=PROMPTS[i];break;}}
  if(!p)return;
  navigator.clipboard.writeText(p.text).then(function(){toast("Copied!");}).catch(function(){toast("Copy failed","err");});
};

window.openEdit=function(id){
  var p=null;for(var i=0;i<PROMPTS.length;i++){if(PROMPTS[i].id===id){p=PROMPTS[i];break;}}
  if(!p)return;
  editingId=id;
  document.getElementById("promptFormTitle").textContent="Edit Prompt";
  populateCatSelect();
  document.getElementById("fName").value=p.name;
  document.getElementById("fCat").value=p.catId;
  document.getElementById("fSub").value=p.sub||"";
  document.getElementById("fText").value=p.text;
  closeView();
  document.getElementById("promptFormOverlay").classList.add("open");
};

window.askDel=function(id){
  var p=null;for(var i=0;i<PROMPTS.length;i++){if(PROMPTS[i].id===id){p=PROMPTS[i];break;}}
  if(!p)return;
  pendingDelId=id;
  document.getElementById("delName").textContent=p.name;
  document.getElementById("delOverlay").classList.add("open");
};

// ── View modal ────────────────────────────────────────────────────────────────
function closeView(){viewingId=null;document.getElementById("viewOverlay").classList.remove("open");}
document.getElementById("viewCopyBtn").onclick=function(){
  if(!viewingId)return;
  var p=null;for(var i=0;i<PROMPTS.length;i++){if(PROMPTS[i].id===viewingId){p=PROMPTS[i];break;}}
  if(!p)return;
  navigator.clipboard.writeText(p.text).then(function(){toast("Copied!");closeView();}).catch(function(){toast("Copy failed","err");});
};
document.getElementById("viewEditBtn").onclick=function(){if(viewingId)window.openEdit(viewingId);};
document.getElementById("viewClose").onclick=closeView;
document.getElementById("viewOverlay").onclick=function(e){if(e.target===this)closeView();};

// ── Prompt form (Add/Edit) ────────────────────────────────────────────────────
function closePromptForm(){editingId=null;document.getElementById("promptFormOverlay").classList.remove("open");}
document.getElementById("promptFormCancel").onclick=closePromptForm;
document.getElementById("promptFormOverlay").onclick=function(e){if(e.target===this)closePromptForm();};

document.getElementById("addPromptBtn").onclick=function(){
  if(!currentUser){toast("Please sign in first","err");return;}
  if(CATS.length===0){toast("Add a category first","err");return;}
  editingId=null;
  document.getElementById("promptFormTitle").textContent="Add Prompt";
  populateCatSelect();
  document.getElementById("fName").value="";
  document.getElementById("fSub").value="";
  document.getElementById("fText").value="";
  if(activeCat!=="all") document.getElementById("fCat").value=activeCat;
  document.getElementById("promptFormOverlay").classList.add("open");
  setTimeout(function(){document.getElementById("fName").focus();},100);
};

document.getElementById("promptFormSave").onclick=async function(){
  var name=document.getElementById("fName").value.trim();
  var catId=document.getElementById("fCat").value;
  var sub=document.getElementById("fSub").value.trim();
  var text=document.getElementById("fText").value.trim();
  if(!name||!catId||!text){toast("Name, Category and Text are required","err");return;}
  var btn=document.getElementById("promptFormSave");
  btn.disabled=true; btn.textContent="Saving...";
  try{
    var uid=currentUser.uid;
    var data={name:name,catId:catId,sub:sub,text:text,updatedAt:serverTimestamp()};
    if(editingId){
      await setDoc(doc(db,"users/"+uid+"/prompts/"+editingId),data,{merge:true});
      toast("Prompt updated!");
    } else {
      data.createdAt=serverTimestamp();
      await addDoc(collection(db,"users/"+uid+"/prompts"),data);
      toast("Prompt saved to cloud!");
    }
    closePromptForm();
  }catch(e){toast("Save failed: "+e.message,"err");}
  finally{btn.disabled=false;btn.textContent="Save";}
};

// ── Category form ─────────────────────────────────────────────────────────────
function closeCatForm(){document.getElementById("catFormOverlay").classList.remove("open");}
document.getElementById("addCatBtn").onclick=function(){
  if(!currentUser){toast("Please sign in first","err");return;}
  document.getElementById("fCatName").value="";
  document.getElementById("catFormOverlay").classList.add("open");
  setTimeout(function(){document.getElementById("fCatName").focus();},100);
};
document.getElementById("catFormCancel").onclick=closeCatForm;
document.getElementById("catFormOverlay").onclick=function(e){if(e.target===this)closeCatForm();};
document.getElementById("catFormSave").onclick=async function(){
  var name=document.getElementById("fCatName").value.trim();
  if(!name){toast("Category name is required","err");return;}
  var btn=document.getElementById("catFormSave");
  btn.disabled=true; btn.textContent="Saving...";
  try{
    await addDoc(collection(db,"users/"+currentUser.uid+"/categories"),{name:name,createdAt:serverTimestamp()});
    toast("Category added!");
    closeCatForm();
  }catch(e){toast("Failed: "+e.message,"err");}
  finally{btn.disabled=false;btn.textContent="Save";}
};

// ── Delete ────────────────────────────────────────────────────────────────────
function closeDel(){pendingDelId=null;document.getElementById("delOverlay").classList.remove("open");}
document.getElementById("delCancel").onclick=closeDel;
document.getElementById("delOverlay").onclick=function(e){if(e.target===this)closeDel();};
document.getElementById("delConfirm").onclick=async function(){
  if(!pendingDelId)return;
  var id=pendingDelId; closeDel();
  try{
    await deleteDoc(doc(db,"users/"+currentUser.uid+"/prompts/"+id));
    toast("Prompt deleted");
  }catch(e){toast("Delete failed: "+e.message,"err");}
};

// ── Search ──────────────────
document.getElementById("searchInput").oninput=function(){searchQ=this.value;renderPrompts();};

// ── Category Context Menu ─────────────────────────────────────────────────────
var catCtxMenu=document.getElementById("catCtxMenu");
window.openCatMenu=function(catId,evt){
  pendingDelCatId=catId; editingCatId=catId;
  catCtxMenu.classList.add("open");
  var x=evt.clientX, y=evt.clientY;
  catCtxMenu.style.top=(y+4)+"px";
  catCtxMenu.style.left=x+"px";
  setTimeout(function(){
    var r=catCtxMenu.getBoundingClientRect();
    if(r.right>window.innerWidth-4) catCtxMenu.style.left=(x-r.width)+"px";
    if(r.bottom>window.innerHeight-4) catCtxMenu.style.top=(y-r.height)+"px";
  },0);
};
document.addEventListener("click",function(e){
  if(!catCtxMenu.contains(e.target)) catCtxMenu.classList.remove("open");
});

document.getElementById("catCtxEdit").onclick=function(){
  catCtxMenu.classList.remove("open");
  if(!editingCatId)return;
  var cat=null;
  for(var i=0;i<CATS.length;i++){if(CATS[i].id===editingCatId){cat=CATS[i];break;}}
  if(!cat)return;
  document.getElementById("fEditCatName").value=cat.name;
  document.getElementById("editCatFormOverlay").classList.add("open");
  setTimeout(function(){var el=document.getElementById("fEditCatName");el.focus();el.select();},100);
};
document.getElementById("catCtxDel").onclick=function(){
  catCtxMenu.classList.remove("open");
  if(!pendingDelCatId)return;
  var cat=null;
  for(var i=0;i<CATS.length;i++){if(CATS[i].id===pendingDelCatId){cat=CATS[i];break;}}
  if(!cat)return;
  document.getElementById("delCatName").textContent=cat.name;
  document.getElementById("delCatOverlay").classList.add("open");
};

// Edit category modal
function closeEditCatForm(){editingCatId=null;document.getElementById("editCatFormOverlay").classList.remove("open");}
document.getElementById("editCatFormCancel").onclick=closeEditCatForm;
document.getElementById("editCatFormOverlay").onclick=function(e){if(e.target===this)closeEditCatForm();};
document.getElementById("editCatFormSave").onclick=async function(){
  var name=document.getElementById("fEditCatName").value.trim();
  if(!name){toast("Category name is required","err");return;}
  if(!editingCatId){toast("Error: no category","err");return;}
  var btn=document.getElementById("editCatFormSave");
  btn.disabled=true; btn.textContent="Saving...";
  try{
    await setDoc(doc(db,"users/"+currentUser.uid+"/categories/"+editingCatId),{name:name},{merge:true});
    toast("Category renamed!");
    closeEditCatForm();
  }catch(e){toast("Failed: "+e.message,"err");}
  finally{btn.disabled=false;btn.textContent="Save";}
};

// Delete category dialog
function closeDelCat(){pendingDelCatId=null;document.getElementById("delCatOverlay").classList.remove("open");}
document.getElementById("delCatCancel").onclick=closeDelCat;
document.getElementById("delCatOverlay").onclick=function(e){if(e.target===this)closeDelCat();};
document.getElementById("delCatConfirm").onclick=async function(){
  if(!pendingDelCatId)return;
  var id=pendingDelCatId; closeDelCat();
  if(activeCat===id){activeCat="all";}
  try{
    await deleteDoc(doc(db,"users/"+currentUser.uid+"/categories/"+id));
    toast("Category deleted");
  }catch(e){toast("Delete failed: "+e.message,"err");}
};

// ── Init ──────────────────────────────────────────────────────────────────────────────
renderAll();
</script>
