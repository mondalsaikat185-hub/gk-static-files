<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Office AI - Reset</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e1a;color:#e8eef7;font-family:system-ui,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.card{background:#141927;border:1px solid #2a3142;border-radius:16px;padding:40px;max-width:500px;width:100%;text-align:center}
h1{font-size:22px;margin-bottom:16px;color:#5b8ff9}
#status{margin:20px 0;padding:16px;border-radius:12px;font-size:14px;line-height:1.8;background:rgba(91,143,249,.15);border:1px solid rgba(91,143,249,.3);color:#5b8ff9}
.done{background:rgba(72,199,142,.15)!important;border-color:rgba(72,199,142,.3)!important;color:#48c78e!important}
</style>
</head><body>
<div class="card">
<h1>Office AI - Cache Reset</h1>
<div id="status">Clearing old data...</div>
</div>
<script>
async function reset() {
  const el = document.getElementById('status');
  try {
    // Unregister all service workers
    if('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      for(const reg of regs) await reg.unregister();
    }
    // Delete all caches
    if('caches' in window) {
      const keys = await caches.keys();
      for(const key of keys) await caches.delete(key);
    }
    el.className = 'done';
    el.innerHTML = 'Done! Redirecting to Office AI...';
    // Wait 1.5s then redirect
    setTimeout(() => { window.location.href = 'index.html'; }, 1500);
  } catch(err) {
    el.innerHTML = 'Error: ' + err.message + '<br><a href="index.html" style="color:#5b8ff9">Open Office AI manually</a>';
  }
}
reset();
</script>
</body></html>
